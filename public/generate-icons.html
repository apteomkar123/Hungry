<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pantry Icon Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body { font-family: sans-serif; padding: 32px; background: #f0f4f8; }
    h2 { color: #1e3a5f; }
    canvas { display: block; margin: 16px 0; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
    button { background: #6BAEE0; color: white; border: none; padding: 12px 28px; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin: 8px 4px; }
    button:hover { background: #4a8fc4; }
    p { color: #555; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Pantry PWA Icon Generator</h2>
  <p>Wait for the font to load, then click the buttons to download the icons and save them to <code>public/</code>.</p>

  <canvas id="c192" width="192" height="192"></canvas>
  <button onclick="download('c192','icon-192.png')">Download icon-192.png</button>

  <canvas id="c512" width="512" height="512"></canvas>
  <button onclick="download('c512','icon-512.png')">Download icon-512.png</button>

  <script>
    function drawIcon(canvas) {
      const s = canvas.width;
      const ctx = canvas.getContext('2d');
      const r = s * 0.195;

      // Rounded rect background
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = '#6BAEE0';
      ctx.fill();

      // Text
      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `bold ${Math.round(s * 0.21)}px 'Pacifico', cursive`;
      ctx.fillText('Pantry', s / 2, s / 2);
    }

    function download(id, filename) {
      const canvas = document.getElementById(id);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = filename;
      a.click();
    }

    // Wait for Pacifico to load before drawing
    document.fonts.ready.then(() => {
      drawIcon(document.getElementById('c192'));
      drawIcon(document.getElementById('c512'));
    });
  </script>
</body>
</html>
